name: Docs fix
description: Report a correction needed in the community docs or wiki drafts.
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "Example: docs/wiki/Drivers-and-Runtimes.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or outdated?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
    validations:
      required: false
  - type: input
    id: source
    attributes:
      label: Source link
      placeholder: "Official docs or reproducible test result"
    validations:
      required: false
